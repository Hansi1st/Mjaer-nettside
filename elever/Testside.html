<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Inspirasjonsside</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
}

/* Header */
header {
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: white;
    padding: 60px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 3em;
}

header p {
    font-size: 1.2em;
}

/* Kort-seksjon */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 50px 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 250px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.card h3 {
    margin-top: 0;
}

/* Fancy knapp */
button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1em;
    transition: background 0.3s, transform 0.2s;
}

button:hover {
    background: #1e40af;
    transform: scale(1.1);
}

/* Footer */
footer {
    background: #111827;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Velkommen!</h1>
    <p>Dette er en inspirasjonsside for elevprosjekter 🚀</p>
    <button onclick="visMelding()">Trykk på meg</button>
</header>

<section class="container">
    <div class="card">
        <h3>Om meg</h3>
        <p>Her kan elevene skrive om seg selv.</p>
    </div>

    <div class="card">
        <h3>Prosjekter</h3>
        <p>Vis frem arbeid og kreative ideer.</p>
    </div>

    <div class="card">
        <h3>Kontakt</h3>
        <p>Legg inn e-post eller kontaktinfo.</p>
    </div>
</section>

<footer>
    © 2026 Min Skole   <title>GitHub Snake Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0d1117; color: white; font-family: sans-serif; flex-direction: column; }
        canvas { border: 2px solid #30363d; background: #161b22; }
    </style>
</head>
<body>
    <h1>GitHub Snake</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Bruk piltastene for å styre!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let snake = [{x: 200, y: 200}];
        let food = {x: 0, y: 0};
        let dx = 20, dy = 0;

        function createFood() {
            food.x = Math.floor(Math.random() * 20) * 20;
            food.y = Math.floor(Math.random() * 20) * 20;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#238636"; // GitHub Grønn
            snake.forEach(part => ctx.fillRect(part.x, part.y, 18, 18));
            ctx.fillStyle = "#f85149"; // Rød mat
            ctx.fillRect(food.x, food.y, 18, 18);

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x === food.x && head.y === food.y) {
                createFood();
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || snake.some(p => p.x === head.x && p.y === head.y)) {
                alert("Game Over! Poeng: " + snake.length);
                snake = [{x: 200, y: 200}];
            }

            snake.unshift(head);
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -20; }
            if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 20; }
            if (e.key === "ArrowLeft" && dx === 0) { dx = -20; dy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { dx = 20; dy = 0; }
        });

        createFood();
        setInterval(draw, 100);
    </script>
</body>
</html>
</footer>

<script>
function visMelding() {
    alert("Så bra at du tester nettsiden! 🎉");
}
</script>

</body>
</html>
