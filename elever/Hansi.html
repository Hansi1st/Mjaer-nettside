<style>

body{
    margin:0;
    font-family: system-ui, Arial, sans-serif;
    background:#161716;
    color:white;
}

/* toppbanner */
header{
    background: linear-gradient(135deg,#23cc61,#3d5c48);
    color:white;
    padding:30px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    font-size:2.2em;
}

/* innhold */
main{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

@keyframes puls {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* Fancy knapp */
button {
    background: #a8bdaf;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1em;
    transition: background 0.3s, transform 0.2s;
    animation: puls 2s infinite;
}

button:hover {
    background: #03fc4e;
    transform: scale(1.2);
}
</style>
<body>

<header>
