<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Elevside</title>

<style>
body{
    margin:0;
    font-family: system-ui, Arial, sans-serif;
    color:white;

    background-image: url("../Bilder/gress.jpg");
    background-size: 1000px;    
    background-repeat: repeat;   
    background-position: top left;

    padding: 20px;
    min-height: 200vh;
}

/* toppbanner */
header{
    background-image: url("../Bilder/himmel.webp");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    min-height: 300px;
    position: relative;
}

header::before{
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.1);
}

header *{
    position: relative;
}

header h1{
    font-size: 3rem;
    margin-left: 75px;
}

header img{
    max-height: 200px;
    border-radius: 10px;
}

/* RAMME */
.ramme{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    pointer-events: none;
    z-index: 9999;

    object-fit: fill;
}

/* tilbake-knapp */
.tilbake-knapp{
    display: inline-block;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);

    color: white;
    padding: 10px 20px;
    text-decoration: none;

    border-radius: 1px;
    border: 1px solid rgba(255, 255, 255, 0.3);

    margin-left: 75px;
    margin-top: 20px;

    transition: 0.2s;
}

.tilbake-knapp:hover{
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
}

/* bilde-knapp */
.bilde-knapp{
    position: relative;
    display: inline-block;

    margin-left: 75px;
    margin-top: 150px;

    border-radius: 1px;
    overflow: hidden;

    transition: 0.2s;
}

.bilde-knapp img{
    width: 220px;
    display: block;
}

.bilde-knapp span{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    color: white;
    font-size: 1.3em;
    font-weight: bold;

    text-shadow: 0 3px 8px rgba(0,0,0,0.7);
}

.bilde-knapp:hover{
    transform: scale(1.05);
}
</style>

</head>

<body>

<img src="../Bilder/frame.png" class="ramme" alt="ramme">

<header> 
    <h1>𝘏𝘦𝘪. 𝘔𝘪𝘵𝘵 𝘯𝘢𝘷𝘯 𝘦𝘳 𝘚𝘺𝘭𝘷𝘦𝘴𝘵𝘦𝘳, 𝘰𝘨 𝘥𝘦𝘵𝘵𝘦 𝘦𝘳 𝘮𝘪𝘯 𝘴𝘪𝘥𝘦.</h1>
</header>

<p>Hei.</p>

<!-- tilbake -->
<a href="../index.html" class="tilbake-knapp">Tilbake</a>

<a href="https://arcade.makecode.com/S89509-28819-34448-02273" class="bilde-knapp">
    <img src="../Bilder/Laburint.png" alt="Gå videre">
    <span>ʟᴀʙᴜʀɪɴᴛ</span>
</a>

</body>
</html>
