<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Elevside</title>

<style>
body{
    margin:0;
    font-family: system-ui, Arial, sans-serif;
    color:white;

    background-image: url("../Bilder/gress.jpg");
    background-size: cover;       
    background-position: center;   
    background-repeat: no-repeat; 

    padding: 20px;
}

/* toppbanner */
header{
    background-image: url("../Bilder/himmel.webp");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    min-height: 300px;

    position: relative;
}

header::before{
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.1);
}

header *{
    position: relative;
}

header h1{
    font-size: 3rem;
    margin-left: 75px;  /* flytter teksten litt til høyre */
}

header img{
    max-height: 200px;
    border-radius: 10px;
}

.ramme{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    pointer-events: none;
    z-index: 9999;

    object-fit: fill;
}
</style>

</head>

<body>

<img src="../Bilder/frame.png" class="ramme" alt="ramme">

<header> 
    <h1>Hei! Mitt navn er Sylvester, og dette er min side.</h1>
</header>

<p>Hei.</p>

<a href="../index.html">Tilbake</a>

</body>
</html>
