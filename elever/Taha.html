<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void INC files</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #111;
      color: white;
      margin: 0;
    }

    img {
      width: 50%;
      height: auto;
      max-width: 400px;
    }

    .box {
      display: block;
      width: 250px;
      margin: 10px auto;
      padding: 15px;
      background-color: #222;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.2s;
    }

    .box:hover {
      background-color: #444;
      transform: scale(1.05);
    }

    button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    /* 💥 EXPLOSION EFFECT */
    @keyframes explode {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(2);
        background-color: red;
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .exploding {
      animation: explode 0.6s forwards;
    }
  </style>

  <script>
    function endreFarge() {
      document.body.style.backgroundColor = "darkblue";
    }

    let count = 0;
    function add() {
      count++;
      document.getElementById("count").textContent = count;
    }

    // 💥 EXPLOSION FUNCTION
    function explode() {
      let btn = document.getElementById("boomBtn");
      btn.classList.add("exploding");

      setTimeout(() => {
        btn.innerText = "💥 BOOM!";
      }, 300);
    }
  </script>
</head>

<body>

  <header>
    <h1>Hei! Jeg er Taha og Jujutsu Kaisen er den beste serien i hele verden</h1>
    <p>Jeg er også en større JJK fan enn GojoMaster6969 aka Joachim.</p>
  </header>

  <main>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQN6SoePPooEzduHUoCJXs7Xxho8Slvq9iMBb_Q-Ve-HJ8ApU_rnS7HP6KElFOmeuhk6zEJ1HQjgqIcXv_JZ0toZXiM_WzF8kgAhFwg7Dre&s=10" alt="Bilde fra Jujutsu Kaisen">

    <!-- INTERAKTIVITET -->
    <div>
      <button onclick="endreFarge()">Endre bakgrunn</button>
    </div>

    <p id="count">0</p>

    <!-- 💥 EXPLOSION BUTTON -->
    <button id="boomBtn" onclick="explode()">DO NOT CLICK ME</button>

    <!-- OM MEG -->
    <section>
    
      <p>
        Trackmania 2020 is the best game ever
      </p>
    </section>

    <!-- LENKER -->
    <nav>
      <a class="box" href="https://makecode.com/_K6RfsM6E9coY">Play my game</a>
    </nav>

  </main>

  <footer>
  
  </footer>

</body>
</html>
