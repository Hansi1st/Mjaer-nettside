<style>

body{
    margin:0;
    font-family: system-ui, Arial, sans-serif;
    background:#f4f6f8;
}

/* toppbanner */
header{
    background: linear-gradient(135deg,#2563eb,#1e40af);
    color:rgb(0, 0, 0);
    padding:30px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:2.2em;
}

/* innhold */
main{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

/* elevkort */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:rgb(33, 86, 245);
    padding:25px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(16, 177, 29, 0.08);
    text-align:center;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 28px rgba(0,0,0,0.12);
}

.card a{
    text-decoration:none;
    color:#ffffff;
    font-weight:bold;
    font-size:1.1em;
}

footer{
    text-align:center;
    padding:30px;
    color:#666;
    font-size:0.9em;
}

</style>
</head>
